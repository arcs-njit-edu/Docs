site_name: NJIT HPC Documentation
site_description: Official HPC NJIT documentation website.
site_url: https://hpc.njit.edu
repo_url: https://github.com/arcs-njit-edu/Docs
#repo_name: arcs-njit-edu/Docs
exclude_docs: |
  - archived/migration
  - archived/news
nav:
